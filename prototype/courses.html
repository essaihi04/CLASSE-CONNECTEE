<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cours publiés — Classes Connectées</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <style>
    :root{--ink:#17211c;--muted:#6f7b75;--line:#dce3df;--paper:#f4f7f4;--white:#fff;--green:#0f7b5f;--dark:#183128}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:system-ui,Segoe UI,sans-serif}header{height:68px;display:flex;align-items:center;gap:14px;padding:0 28px;background:#fff;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink);font-weight:800}.logo{width:34px;height:34px;border-radius:10px;background:var(--green);color:#fff;display:grid;place-items:center;font-size:12px}.header-title{margin-left:auto;color:#65716b;font-size:12px}.prof{color:var(--green);font-size:11px;font-weight:700;text-decoration:none;border:1px solid #cfe0d8;border-radius:9px;padding:8px 11px}
    .hero{background:var(--dark);color:#fff;padding:55px 28px 80px}.hero-inner,.content{max-width:1100px;margin:auto}.eyebrow{color:#9dccb9;text-transform:uppercase;letter-spacing:.14em;font-size:10px;font-weight:800}.hero h1{font-size:44px;letter-spacing:-.045em;margin:10px 0 8px}.hero p{color:#afc1b9;max-width:580px;font-size:14px;line-height:1.6}.filters{display:grid;grid-template-columns:minmax(220px,1fr) 220px 240px;gap:10px;max-width:950px;margin-top:27px}.filters input,.filters select{height:46px;border:1px solid #456257;border-radius:11px;background:#233f35;color:#fff;padding:0 14px;outline:0}.filters input::placeholder{color:#9eb0a8}
    .content{padding:32px 24px 70px}.result-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.result-head h2{font-size:18px;margin:0}.result-head span{font-size:11px;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:17px;overflow:hidden;display:flex;flex-direction:column;min-height:260px;transition:.18s}.card:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(22,52,40,.09)}.card-top{height:8px;background:var(--course-color,var(--green))}.card-body{padding:19px;display:flex;flex-direction:column;flex:1}.tags{display:flex;gap:6px;flex-wrap:wrap}.tag{font-size:8px;text-transform:uppercase;letter-spacing:.08em;background:#edf3ef;color:#52655b;border-radius:999px;padding:5px 7px;font-weight:800}.card h3{font-size:18px;line-height:1.25;margin:14px 0 7px}.description{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:18px}.meta{font-size:9px;color:#89938e}.open{background:var(--green);color:#fff;text-decoration:none;border-radius:9px;padding:9px 12px;font-size:10px;font-weight:800}.progress{height:4px;background:#e3e8e5;border-radius:5px;margin-top:14px;overflow:hidden}.progress i{display:block;height:100%;background:var(--course-color,var(--green))}.empty{grid-column:1/-1;border:1px dashed #cbd5cf;border-radius:16px;padding:45px;text-align:center;color:var(--muted)}
    .admin-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}.admin-actions a,.admin-actions button{border:1px solid var(--line);background:#fff;color:#3c4c44;border-radius:8px;padding:7px 10px;font-size:10px;font-weight:800;cursor:pointer;text-decoration:none}.admin-actions .danger{border-color:#f3c1c1;color:#a02626;background:#fdf3f3}.admin-actions a:hover,.admin-actions button:hover{border-color:#9cb8ab}.hidden-card{opacity:.62}.hidden-badge{background:#5f3535;color:#ffd9d9}
    @media(max-width:850px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:560px){header{padding:0 15px}.header-title{display:none}.hero{padding:40px 20px 65px}.hero h1{font-size:34px}.filters{grid-template-columns:1fr}.content{padding:25px 16px 55px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header><a class="brand" href="courses.html"><span class="logo">CC</span>Classes Connectées</a><span class="header-title">Bibliothèque pédagogique</span><a class="prof" href="login.html">Espace professeur</a></header>
  <section class="hero"><div class="hero-inner"><div class="eyebrow">Cours accessibles</div><h1>Choisis ton prochain cours</h1><p>Des cours structurés et validés par les professeurs, classés par matière et par année scolaire exacte.</p><div class="filters"><input id="search" type="search" placeholder="Rechercher un cours…"><select id="subjectFilter"><option value="">Toutes les matières</option></select><select id="gradeFilter"><option value="">Tous les niveaux</option></select></div></div></section>
  <main class="content">
    <div class="result-head"><h2>Cours publiés</h2><span id="resultCount">Chargement…</span></div>
    <div id="courseGrid" class="grid"><div class="empty">Chargement des cours…</div></div>
    <div class="result-head" style="margin-top:38px"><h2>Cours de démonstration</h2><span id="demoCount"></span></div>
    <div id="demoGrid" class="grid"></div>
  </main>
  <script src="lecons.js"></script>
  <script src="admin-course-manager.js"></script>
  <script src="courses.js"></script>
</body>
</html>

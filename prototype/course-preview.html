<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aperçu du cours — Classes Connectées</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <style>
    :root{--bg:#f3f6f3;--ink:#18231e;--muted:#6f7c75;--line:#dce4df;--green:#0f7b5f;--dark:#163128;--white:#fff;--amber:#d89231}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,Segoe UI,sans-serif}[hidden]{display:none!important}
    header{height:66px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 24px;position:sticky;top:0;z-index:10}header strong{flex:1}header a,header button{border:0;border-radius:9px;padding:9px 12px;text-decoration:none;font-size:12px;font-weight:700;cursor:pointer}.back{color:#526159;background:#edf2ef}.edit{background:var(--green);color:#fff}.logout{background:transparent;color:#758078}.avatar-start{background:#173f75;color:#fff}.avatar-start.running{background:#9b2c2c}
    .shell{display:grid;grid-template-columns:250px minmax(0,1fr);min-height:calc(100vh - 66px)}aside{background:var(--dark);color:#fff;padding:26px 18px}.mode{font-size:9px;text-transform:uppercase;letter-spacing:.13em;color:#9fc3b4;font-weight:800}.course-name{font-size:22px;line-height:1.2;margin:9px 0 5px}.course-meta{font-size:11px;color:#a9bab3;line-height:1.5}.session-nav{display:grid;gap:7px;margin-top:26px}.session-button{border:1px solid transparent;background:transparent;color:#b9c8c1;border-radius:11px;text-align:left;padding:11px;cursor:pointer}.session-button b,.session-button small{display:block}.session-button b{font-size:12px}.session-button small{font-size:9px;margin-top:3px;color:#8da49a}.session-button.active{background:#24483b;border-color:#3f6658;color:#fff}
    main{padding:42px clamp(22px,5vw,68px) 70px}.hero{max-width:900px;margin:0 auto 28px}.hero-top{display:flex;justify-content:space-between;gap:20px}.eyebrow{color:var(--green);font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:800}.hero h1{font-size:36px;letter-spacing:-.04em;margin:8px 0}.hero p{color:var(--muted);font-size:14px}.status{align-self:flex-start;border-radius:999px;padding:7px 11px;background:#e2f1ea;color:var(--green);font-size:9px;text-transform:uppercase;font-weight:800}.status.draft{background:#fff0da;color:#9b651d}
    .progress{height:5px;background:#dfe6e2;border-radius:9px;overflow:hidden;margin-top:22px}.progress i{display:block;height:100%;background:var(--green);transition:.25s}.blocks{max-width:900px;margin:auto;display:grid;gap:14px}.block{background:#fff;border:1px solid var(--line);border-radius:17px;padding:20px;box-shadow:0 7px 24px rgba(24,52,41,.05)}.block-head{display:flex;align-items:center;gap:11px;margin-bottom:12px}.type{display:grid;place-items:center;width:34px;height:34px;border-radius:10px;background:#e9f3ee;color:var(--green);font-size:9px;font-weight:900}.block-title{flex:1}.block-title h2{font-size:16px;margin:0}.block-title small{font-size:10px;color:var(--muted)}.duration{font-size:10px;color:#7d8982}.content{font-size:15px;line-height:1.7;white-space:pre-wrap}.media{margin-top:15px;border-radius:12px;overflow:hidden;background:#0d1713}.media img,.media video{display:block;width:100%;max-height:520px;object-fit:contain}.media-link{display:flex;align-items:center;justify-content:space-between;padding:18px;color:#fff;text-decoration:none}.media-link span{font-size:12px}.question{border-left:4px solid #d89231}.summary{background:#eef6f2}.empty{text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px;padding:35px}.nav-actions{max-width:900px;margin:24px auto 0;display:flex;justify-content:space-between}.nav-actions button{border:0;border-radius:10px;padding:11px 15px;font-weight:700}.prev{background:#e5ebe7;color:#536159}.next{background:var(--green);color:#fff}.nav-actions button:disabled{opacity:.35}
    .block.done{border-color:#8fc7b2;background:#f5fbf8}.block.speaking{border-color:#3b82f6;box-shadow:0 0 0 3px #dbeafe,0 14px 34px rgba(23,63,117,.12)}.answer-area{margin-top:14px;padding:13px;background:#f5f7f5;border-radius:11px}.answer-area label{display:block;font-size:10px;font-weight:800;color:#68756e;margin-bottom:6px}.answer-area textarea{width:100%;min-height:78px;border:1px solid #d8e0dc;border-radius:9px;padding:10px;resize:vertical;font:inherit}.block-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}.complete,.explain-block{border:1px solid #cbd8d1;background:#fff;color:#587066;border-radius:9px;padding:8px 11px;font-size:10px;font-weight:800}.explain-block{border-color:#bfd2ea;color:#173f75;background:#f3f7fc}.complete.done{background:var(--green);border-color:var(--green);color:#fff}
    .avatar-coach{position:fixed;right:20px;bottom:18px;width:255px;z-index:30;border:1px solid #284c78;border-radius:18px;overflow:hidden;background:linear-gradient(180deg,#0d2039,#122b4a);box-shadow:0 18px 55px rgba(4,18,34,.34);color:#fff}.avatar-coach iframe{display:block;width:100%;height:265px;border:0;background:transparent}.avatar-coach-copy{padding:11px 13px 13px;background:rgba(7,24,43,.86)}.avatar-coach-copy b{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:#8bc7ff;margin-bottom:4px}.avatar-coach-copy span{display:block;font-size:12px;line-height:1.4;color:#edf6ff}.avatar-close{position:absolute;right:9px;top:9px;width:28px;height:28px!important;padding:0!important;border-radius:50%!important;background:#102a47!important;color:#fff!important;z-index:2}
    .loading{min-height:60vh;display:grid;place-items:center;color:var(--muted)}
    @media(max-width:760px){.shell{grid-template-columns:1fr}aside{padding:16px}.course-name,.course-meta{display:none}.session-nav{display:flex;overflow:auto;margin-top:10px}.session-button{min-width:130px}.hero h1{font-size:28px}main{padding:28px 16px 55px}header{padding:0 8px;gap:6px}header strong,.logout,#shareBtn{display:none}.avatar-coach{right:8px;bottom:8px;width:190px}.avatar-coach iframe{height:190px}.avatar-coach-copy span{font-size:10px}}
  </style>
</head>
<body>
  <header><a id="teacherBack" class="back" href="prof.html?view=private" hidden>← Mes cours</a><strong>Classes Connectées</strong><button id="avatarStartBtn" class="avatar-start" type="button" disabled>▶ Explication par l’avatar</button><button id="shareBtn" class="back" type="button">Partager le cours</button><a id="editLink" class="edit" href="#" hidden>✎ Supports et blocs</a><button id="logoutBtn" class="logout" type="button" hidden>Déconnexion</button></header>
  <div id="loading" class="loading">Chargement du cours…</div>
  <div id="app" class="shell" hidden>
    <aside><div class="mode">Aperçu élève</div><h2 id="sideTitle" class="course-name"></h2><div id="sideMeta" class="course-meta"></div><nav id="sessionNav" class="session-nav"></nav></aside>
    <main><div class="hero"><div class="hero-top"><div><div id="sessionEyebrow" class="eyebrow"></div><h1 id="sessionTitle"></h1><p id="sessionObjective"></p></div><span id="courseStatus" class="status"></span></div><div class="progress"><i id="progressBar"></i></div></div><div id="blocks" class="blocks"></div><div class="nav-actions"><button id="prevSession" class="prev" type="button">← Séance précédente</button><button id="nextSession" class="next" type="button">Séance suivante →</button></div></main>
  </div>
  <aside id="avatarCoach" class="avatar-coach" hidden><button id="avatarClose" class="avatar-close" type="button" aria-label="Arrêter l’avatar">×</button><iframe id="avatarFrame" src="avatar3d.html" title="Avatar professeur IA" allowtransparency="true"></iframe><div class="avatar-coach-copy"><b id="avatarState">Professeur IA</b><span id="avatarSpeech">Prêt à expliquer cette séance.</span></div></aside>
  <script src="course-preview.js"></script>
</body>
</html>

<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ouverture du cours — Classes Connectées</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0f172a;color:#e2e8f0;font-family:system-ui,Segoe UI,sans-serif}
    main{text-align:center;padding:30px}.spinner{width:38px;height:38px;margin:0 auto 18px;border:4px solid #334155;border-top-color:#22d3ee;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
    a{color:#67e8f9}
  </style>
</head>
<body>
  <main><div class="spinner"></div><p id="message">Ouverture du cours dans la classe avec l’avatar…</p></main>
  <script>
    const courseId=new URLSearchParams(location.search).get('course')||'';
    if(/^[0-9a-f-]{36}$/i.test(courseId))location.replace('index.html?course='+encodeURIComponent(courseId));
    else document.getElementById('message').innerHTML='Cours invalide. <a href="courses.html">Retour aux cours publiés</a>';
  </script>
</body>
</html>
